backend:
  name: github
  repo: MadhavSharma-1/Gatee-Portfolio-Web-App
  branch: main
  base_url: https://gatee-gala-portfolio.netlify.app

media_folder: "images"
public_folder: "/images"

collections:
  - name: "content"
    label: "Portfolio"
    delete: false
    editor:
      preview: false
    files:
      - name: "portfolio"
        label: "Portfolio Content"
        file: "data.json"
        format: "json"
        fields:
          - label: "Site Settings"
            name: "meta"
            widget: "object"
            fields:
              - { label: "Browser Tab Title", name: "siteTitle", widget: "string" }
              - { label: "Google Analytics ID", name: "analyticsId", widget: "string", required: false }
              - { label: "Formspree Form ID", name: "formspreeId", widget: "string", required: false }
          - label: "Navigation & CV"
            name: "nav"
            widget: "object"
            fields:
              - { label: "Logo / Brand Text", name: "brand", widget: "string" }
              - { label: "View CV URL", name: "cvViewUrl", widget: "string", required: false }
              - { label: "Download CV URL", name: "cvDownloadUrl", widget: "string", required: false }
          - label: "Hero (top of page)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Intro Tag", name: "tag", widget: "string" }
              - { label: "Full Name", name: "name", widget: "string" }
              - { label: "Title / Role", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - label: "Primary Button"
                name: "primaryCta"
                widget: "object"
                fields:
                  - { label: "Text", name: "text", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
              - label: "Secondary Button"
                name: "secondaryCta"
                widget: "object"
                fields:
                  - { label: "Text", name: "text", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "Photo", name: "photoUrl", widget: "image", required: false }
              - label: "Experience Badge"
                name: "badge"
                widget: "object"
                fields:
                  - { label: "Number", name: "number", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Bio Paragraphs"
                name: "paragraphs"
                widget: "list"
                field: { label: "Paragraph", name: "paragraph", widget: "text" }
              - label: "Highlights"
                name: "highlights"
                widget: "list"
                summary: "{{fields.text}}"
                fields:
                  - { label: "Icon", name: "icon", widget: "string" }
                  - { label: "Text", name: "text", widget: "string" }
                  - { label: "Link (optional)", name: "href", widget: "string", required: false }
          - label: "Skill Cards"
            name: "skills"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Bullet Points"
                name: "bullets"
                widget: "list"
                field: { label: "Bullet", name: "bullet", widget: "string" }
          - label: "Skill Tags"
            name: "skillTags"
            widget: "list"
            field: { label: "Tag", name: "tag", widget: "string" }
          - label: "Stats (animated counters)"
            name: "stats"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Number", name: "number", widget: "number", value_type: "int", default: 0 }
              - { label: "Suffix", name: "suffix", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
          - label: "Achievement Cards"
            name: "achievements"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Icon", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Tag", name: "tag", widget: "string" }
          - label: "Experience"
            name: "experience"
            widget: "list"
            summary: "{{fields.role}} - {{fields.company}}"
            fields:
              - { label: "Role / Job Title", name: "role", widget: "string" }
              - { label: "Company / Label", name: "company", widget: "string" }
              - { label: "Period", name: "period", widget: "string" }
              - { label: "Description", name: "desc", widget: "text", required: false }
              - label: "Bullet Points"
                name: "bullets"
                widget: "list"
                field: { label: "Bullet", name: "bullet", widget: "string" }
              - label: "Tags"
                name: "tags"
                widget: "list"
                field: { label: "Tag", name: "tag", widget: "string" }
          - label: "Brands"
            name: "brands"
            widget: "list"
            summary: "{{fields.name}} - {{fields.category}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Your Role / Project", name: "role", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Background Image", name: "imageUrl", widget: "image", required: false }
              - { label: "Link (optional)", name: "link", widget: "string", required: false }
          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "LinkedIn URL", name: "linkedin", widget: "string" }
              - { label: "Instagram URL", name: "instagram", widget: "string" }
              - { label: "Footer Tagline", name: "footerTagline", widget: "string" }
